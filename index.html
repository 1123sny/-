<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>志愿盲盒 - 中国传媒大学25届视觉传达小组作业</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 顶部图片展示区 */
        .top-section {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .left-small-images {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 15px;
            flex: 1;
        }

        .small-image-item {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            min-height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .small-image-item:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-5px);
        }

        .right-long-image {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            flex: 1;
            min-height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .right-long-image:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-5px);
        }

        .placeholder-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 18px;
            text-align: center;
            line-height: 1.6;
        }

        /* 底部文字展示卡片 */
        .bottom-section {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .text-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        .text-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .card-title {
            font-size: 20px;
            font-weight: bold;
            color: #764ba2;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }

        .card-desc {
            font-size: 14px;
            color: #555;
            line-height: 1.8;
        }

        /* 页脚 */
        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            padding: 20px;
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .top-section {
                flex-direction: column;
            }

            .bottom-section {
                grid-template-columns: 1fr;
            }

            .left-small-images {
                grid-template-columns: 1fr 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部图片展示区 -->
        <div class="top-section">
            <div class="left-small-images">
                <div class="small-image-item" id="img1">
                    <span class="placeholder-text">图1</span>
                </div>
                <div class="small-image-item" id="img2">
                    <span class="placeholder-text">图2</span>
                </div>
                <div class="small-image-item" id="img3">
                    <span class="placeholder-text">图3</span>
                </div>
                <div class="small-image-item" id="img4">
                    <span class="placeholder-text">图4</span>
                </div>
            </div>
            <div class="right-long-image" id="img-long">
                <span class="placeholder-text">图片<br>展示区</span>
            </div>
        </div>

        <!-- 底部文字展示卡片 -->
        <div class="bottom-section">
            <div class="text-card">
                <div class="card-title">成员介绍</div>
                <div class="card-desc">
                    组长：XXX<br>
                    视觉设计：XXX<br>
                    文案策划：XXX<br>
                    指导老师：XXX
                </div>
            </div>

            <div class="text-card">
                <div class="card-title">设计理念</div>
                <div class="card-desc">
                    本课题旨在探索"盲盒"文化背后的随机性与未知惊喜，结合视觉传达设计语言，打破传统排版界限，构建具有强烈视觉冲击力的展示空间。
                </div>
            </div>

            <div class="text-card">
                <div class="card-title">技术栈</div>
                <div class="card-desc">
                    Adobe Photoshop / Illustrator<br>
                    Figma / Sketch<br>
                    HTML / CSS
                </div>
            </div>

            <div class="text-card">
                <div class="card-title">联系方式</div>
                <div class="card-desc">
                    邮箱：group25@cuc.edu.cn<br>
                    地址：中国传媒大学视觉传达实验室
                </div>
            </div>
        </div>

        <footer>
            © 2025 志愿盲盒 | 中国传媒大学25届视觉传达小组作业
        </footer>
    </div>

    <script>
        // 预留脚本区域，可在此添加交互功能
    </script>
</body>
</html>
